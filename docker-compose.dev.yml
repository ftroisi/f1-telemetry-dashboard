services:
  db:
    image: postgres:18-alpine3.23
    container_name: f1-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: f1_telemetry
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
    ports:
      - "5432:5432"
    volumes:
      - f1-postgres-data:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1user -d f1_telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: f1-backend-dev
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: f1_telemetry
      DB_USER: f1user
      DB_PASSWORD: f1password
      PORT: 4000
      OPENF1_BASE_URL: https://api.openf1.org/v1
      RATE_LIMIT_PER_SECOND: 3
      RATE_LIMIT_PER_MINUTE: 30
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./db:/app/db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: f1-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/index.html:/app/index.html
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/postcss.config.js:/app/postcss.config.js
    environment:
      - VITE_API_URL=http://backend:4000
    depends_on:
      - backend

volumes:
  f1-postgres-data:
    driver: local
